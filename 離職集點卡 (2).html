<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>離職集點卡</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    min-height: 100dvh;
    background-image: linear-gradient(to top, #fbc2eb 0%, #a6c1ee 100%);
    font-family: 'Noto Serif TC', serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 12px 48px;
    -webkit-font-smoothing: antialiased;
  }

  .card {
    background: rgba(255,255,255,0.55);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    border-radius: 24px;
    padding: 28px 20px 24px;
    max-width: 780px;
    width: 100%;
    box-shadow: 0 8px 40px rgba(166,193,238,0.35), 0 1.5px 0 rgba(255,255,255,0.8) inset;
    border: 1.5px solid rgba(255,255,255,0.7);
  }

  .header {
    text-align: center;
    margin-bottom: 20px;
  }

  .title {
    font-size: clamp(1.6rem, 6vw, 2.4rem);
    font-weight: 900;
    letter-spacing: 0.15em;
    background: linear-gradient(135deg, #c084bc 0%, #818cf8 60%, #60a5fa 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1.2;
    margin-bottom: 6px;
  }

  .subtitle {
    font-size: clamp(0.72rem, 2.5vw, 0.85rem);
    color: #a78bac;
    letter-spacing: 0.06em;
    font-weight: 400;
  }

  .progress-bar-wrap {
    background: rgba(200,180,230,0.2);
    border-radius: 100px;
    height: 10px;
    margin: 14px 0 5px;
    overflow: hidden;
    border: 1px solid rgba(200,180,230,0.35);
  }

  .progress-bar {
    height: 100%;
    border-radius: 100px;
    background: linear-gradient(90deg, #fbc2eb 0%, #a6c1ee 100%);
    transition: width 0.5s cubic-bezier(.4,0,.2,1);
  }

  .progress-label {
    text-align: right;
    font-size: 0.75rem;
    color: #9b8fb0;
    margin-bottom: 16px;
    letter-spacing: 0.04em;
  }

  /* Grid: 5 columns on touch/mobile, 10 columns on desktop */
  .grid {
    display: grid;
    grid-template-columns: repeat(10, 1fr);
    gap: 5px;
    width: 100%;
  }

  @media (pointer: coarse) {
    .grid {
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
    }
  }

  .cell {
    aspect-ratio: 1 / 1;
    min-width: 0;
    min-height: 0;
    border-radius: 8px;
    background: rgba(255,255,255,0.6);
    border: 1.5px solid rgba(200,180,230,0.4);
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-size: 0.5rem;
    color: #c4b2d4;
    font-weight: 700;
    letter-spacing: 0.02em;
    transition: background 0.18s, border-color 0.18s, transform 0.13s, box-shadow 0.18s;
    position: relative;
    overflow: hidden;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }

  .cell:active:not(.stamped) {
    background: rgba(251,194,235,0.4);
    transform: scale(0.94);
  }

  .cell:hover:not(.stamped) {
    background: rgba(251,194,235,0.3);
    border-color: #e0b4d8;
    transform: scale(1.06);
    box-shadow: 0 3px 14px rgba(200,130,200,0.18);
  }

  .cell.stamped {
    background: linear-gradient(135deg, rgba(251,194,235,0.6) 0%, rgba(166,193,238,0.6) 100%);
    border-color: rgba(166,140,220,0.5);
    box-shadow: 0 2px 10px rgba(180,140,220,0.2);
  }

  .cell.stamped:active {
    transform: scale(0.94);
    opacity: 0.85;
  }

  .cell.stamped:hover {
    background: linear-gradient(135deg, rgba(251,194,235,0.7) 0%, rgba(166,193,238,0.7) 100%);
    transform: scale(1.06);
    box-shadow: 0 3px 14px rgba(200,130,200,0.22);
    cursor: pointer;
  }

  .cell .stamp-icon {
    font-size: clamp(0.9rem, 2.8vw, 1.3rem);
    line-height: 1;
    margin-bottom: 1px;
    display: none;
    animation: popIn 0.32s cubic-bezier(.17,.67,.35,1.35);
  }

  @media (pointer: coarse) {
    .cell .stamp-icon {
      font-size: 1.4rem;
    }
  }

  .cell.stamped .stamp-icon {
    display: block;
  }

  .cell .cell-num {
    font-size: clamp(0.38rem, 1.2vw, 0.55rem);
    color: #bbaacb;
    font-weight: 700;
  }

  @media (pointer: coarse) {
    .cell .cell-num {
      font-size: 0.62rem;
    }
  }

  .cell.stamped .cell-num {
    color: #a08bbd;
  }

  .cell .cell-date {
    font-size: clamp(0.3rem, 0.9vw, 0.42rem);
    color: #b0a0c4;
    margin-top: 1px;
    display: none;
    text-align: center;
    line-height: 1.2;
  }

  @media (pointer: coarse) {
    .cell .cell-date {
      font-size: 0.48rem;
    }
  }

  .cell.stamped .cell-date {
    display: block;
  }

  .cell.stamped .cell-num-plain {
    display: none;
  }

  @keyframes popIn {
    0% { transform: scale(0) rotate(-20deg); opacity: 0; }
    60% { transform: scale(1.25) rotate(5deg); opacity: 1; }
    100% { transform: scale(1) rotate(0); }
  }

  .footer {
    text-align: center;
    margin-top: 20px;
    font-size: 0.82rem;
    color: #b09ac0;
    letter-spacing: 0.05em;
    line-height: 1.7;
  }

  .btn-row {
    display: flex;
    gap: 8px;
    justify-content: center;
    flex-wrap: wrap;
    margin-top: 12px;
  }

  .quote {
    font-style: italic;
    font-size: 0.8rem;
    color: #c4a8d6;
    margin-top: 4px;
  }

  .reset-btn {
    padding: 9px 18px;
    border-radius: 100px;
    background: rgba(255,255,255,0.5);
    border: 1.5px solid rgba(200,170,230,0.4);
    color: #b090c0;
    font-family: 'Noto Serif TC', serif;
    font-size: 0.8rem;
    cursor: pointer;
    letter-spacing: 0.08em;
    transition: background 0.15s, color 0.15s, transform 0.12s;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
    min-height: 40px; /* touch-friendly tap target */
  }

  .reset-btn:hover {
    background: rgba(251,194,235,0.3);
    color: #9060a0;
    transform: scale(1.04);
  }

  .reset-btn:active {
    transform: scale(0.96);
    background: rgba(251,194,235,0.4);
  }

  .confetti-overlay {
    pointer-events: none;
    position: fixed;
    inset: 0;
    z-index: 999;
    overflow: hidden;
    display: none;
  }

  .confetti-particle {
    position: absolute;
    border-radius: 3px;
    opacity: 0.85;
    animation: fall linear forwards;
  }

  @keyframes fall {
    0% { transform: translateY(-40px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }

  /* Toast notification */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: rgba(60, 30, 80, 0.85);
    color: #f5e6ff;
    border-radius: 100px;
    padding: 10px 22px;
    font-size: 0.85rem;
    letter-spacing: 0.06em;
    backdrop-filter: blur(10px);
    z-index: 1000;
    transition: transform 0.35s cubic-bezier(.17,.67,.35,1.3), opacity 0.35s;
    opacity: 0;
    pointer-events: none;
    white-space: nowrap;
  }

  .toast.show {
    transform: translateX(-50%) translateY(0);
    opacity: 1;
  }
</style>
</head>
<body>

<div class="card">
  <div class="header">
    <div class="title">離職集點卡</div>
    <div class="subtitle">共 100 格，集滿就可以離職啦 ✨</div>
  </div>

  <div class="progress-bar-wrap">
    <div class="progress-bar" id="progressBar" style="width:0%"></div>
  </div>
  <div class="progress-label" id="progressLabel">0 / 100</div>

  <div class="grid" id="grid"></div>

  <div class="footer">
    <div class="quote">真的做不了，沒有一天是適合上班的。</div>
    <div class="btn-row">
      <button class="reset-btn" onclick="exportTxt()">📤 匯出</button>
      <button class="reset-btn" onclick="document.getElementById('importInput').click()">📥 匯入</button>
      <button class="reset-btn" onclick="resetCard()">🗑️ 重置</button>
    </div>
    <div class="btn-row" style="margin-top: 8px;">
      <a href="https://www.threads.com/@qqian___/post/C_NWmddyP7z?xmt=AQF0ceDpyu7bnDeCLHMigRFB7Lre8W4lIlCVkHiz38l3cBQfYlL-xhdgwRxornzQIUYx_8-c&slof=1" target="_blank" rel="noopener" class="reset-btn" style="text-decoration:none; display:inline-block;">🖨️ 原版集點卡</a>
    </div>
    <input type="file" id="importInput" accept=".txt" style="display:none" onchange="importTxt(event)">
  </div>
</div>

<div class="confetti-overlay" id="confettiOverlay"></div>
<div class="toast" id="toast"></div>

<script>
  const STORAGE_KEY = 'resignation_card_v1';
  const TOTAL = 100;
  const EMOJIS = ['😮‍💨','😤','🫠','💀','🙃','😵','🫥','😩','🤡','😭'];

  function loadData() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      return raw ? JSON.parse(raw) : {};
    } catch(e) { return {}; }
  }

  function saveData(data) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  }

  function formatDate(iso) {
    const d = new Date(iso);
    return `${d.getMonth()+1}/${d.getDate()}`;
  }

  function updateProgress(data) {
    const count = Object.keys(data).length;
    const pct = (count / TOTAL) * 100;
    document.getElementById('progressBar').style.width = pct + '%';
    document.getElementById('progressLabel').textContent = `${count} / ${TOTAL}`;
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(t._timer);
    t._timer = setTimeout(() => t.classList.remove('show'), 2200);
  }

  function buildGrid() {
    const grid = document.getElementById('grid');
    grid.innerHTML = '';
    const data = loadData();

    for (let i = 1; i <= TOTAL; i++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.dataset.index = i;

      if (data[i]) {
        cell.classList.add('stamped');
        const emoji = EMOJIS[(i-1) % EMOJIS.length];
        cell.innerHTML = `
          <span class="stamp-icon">${emoji}</span>
          <span class="cell-num">${i}</span>
          <span class="cell-date">${formatDate(data[i])}</span>
        `;
      } else {
        cell.innerHTML = `<span class="cell-num cell-num-plain">${i}</span>`;
      }

      attachCellEvents(cell, i);
      grid.appendChild(cell);
    }

    updateProgress(data);
  }

  function attachCellEvents(cell, index) {
    cell.addEventListener('click', () => {
      const data = loadData();
      if (data[index]) {
        unstampCell(index, cell);
      } else {
        stampCell(index, cell);
      }
    });
  }

  function stampCell(index, cell) {
    const data = loadData();
    if (data[index]) return;

    const now = new Date().toISOString();
    data[index] = now;
    saveData(data);

    const emoji = EMOJIS[(index-1) % EMOJIS.length];
    cell.innerHTML = `
      <span class="stamp-icon">${emoji}</span>
      <span class="cell-num">${index}</span>
      <span class="cell-date">${formatDate(now)}</span>
    `;
    cell.classList.add('stamped', 'just-stamped');

    updateProgress(data);

    const count = Object.keys(data).length;
    if (count === TOTAL) {
      setTimeout(launchConfetti, 200);
      showToast('🎉 集滿了！可以離職啦！');
    }
  }

  function unstampCell(index, cell) {
    const data = loadData();
    if (!data[index]) return;

    delete data[index];
    saveData(data);

    cell.classList.remove('stamped', 'just-stamped');
    cell.innerHTML = `<span class="cell-num cell-num-plain">${index}</span>`;
    cell.style.transition = 'background 0.2s';
    cell.style.background = 'rgba(251,194,235,0.25)';
    setTimeout(() => { cell.style.background = ''; }, 300);

    updateProgress(data);
  }

  function exportTxt() {
    const data = loadData();
    const lines = ['離職集點卡紀錄', '===================='];
    for (let i = 1; i <= TOTAL; i++) {
      if (data[i]) {
        const d = new Date(data[i]);
        const dateStr = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
        lines.push(`${i}=${dateStr}`);
      }
    }
    lines.push('====================');
    lines.push(`共 ${Object.keys(data).length} / ${TOTAL} 格`);

    const blob = new Blob([lines.join('\n')], { type: 'text/plain;charset=utf-8' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = '離職集點卡.txt';
    a.click();
    URL.revokeObjectURL(a.href);
    showToast('📤 已匯出紀錄');
  }

  function importTxt(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const lines = e.target.result.split('\n');
        const newData = {};
        let count = 0;
        for (const line of lines) {
          const match = line.trim().match(/^(\d+)=(\d{4}-\d{2}-\d{2})$/);
          if (match) {
            const idx = parseInt(match[1]);
            if (idx >= 1 && idx <= TOTAL) {
              newData[idx] = new Date(match[2]).toISOString();
              count++;
            }
          }
        }
        if (count === 0) {
          showToast('⚠️ 找不到有效的紀錄');
          return;
        }
        if (!confirm(`找到 ${count} 筆紀錄，匯入後將覆蓋目前資料，確定嗎？`)) return;
        saveData(newData);
        buildGrid();
        showToast(`📥 已匯入 ${count} 筆紀錄`);
      } catch(err) {
        showToast('❌ 匯入失敗，請確認格式');
      }
      event.target.value = '';
    };
    reader.readAsText(file, 'utf-8');
  }

  function resetCard() {
    if (!confirm('確定要重置集點卡嗎？所有紀錄將清除。')) return;
    localStorage.removeItem(STORAGE_KEY);
    buildGrid();
    showToast('🗑️ 已重置');
  }

  function launchConfetti() {
    const overlay = document.getElementById('confettiOverlay');
    overlay.style.display = 'block';
    overlay.innerHTML = '';
    const colors = ['#fbc2eb','#a6c1ee','#c084bc','#818cf8','#f9a8d4','#93c5fd'];
    for (let i = 0; i < 120; i++) {
      const p = document.createElement('div');
      p.className = 'confetti-particle';
      const size = Math.random() * 10 + 6;
      p.style.cssText = `
        left: ${Math.random()*100}%;
        top: -20px;
        width: ${size}px;
        height: ${size * (Math.random()*1.5+0.5)}px;
        background: ${colors[Math.floor(Math.random()*colors.length)]};
        animation-duration: ${Math.random()*2.5+1.5}s;
        animation-delay: ${Math.random()*1.5}s;
      `;
      overlay.appendChild(p);
    }
    setTimeout(() => { overlay.style.display = 'none'; }, 5000);
  }

  buildGrid();
</script>
</body>
</html>
